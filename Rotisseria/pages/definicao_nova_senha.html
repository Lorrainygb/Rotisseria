<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir senha</title>
    <link rel="stylesheet" href="../css/pages/formulario.css">
    <link rel="stylesheet" href="../css/global/global.css">
    <link rel="stylesheet" href="../css/responsividade/formulario.css">
    <link rel="shortcut icon" href="../img/global/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div class="logo">
                <img src="../img/global/Dona_Elisa_logo.png" alt="Logo Dona Elisa">
            </div>
        
            <form class="form-section">
                <h1>Defina uma nova senha</h1>
                <div class="group">
                    <label for="nova_senha">Nova senha:</label>
                    <input type="password" name="nova_senha" autocomplete="new-password" id="nova_senha">
                </div>
                <div class="group">
                    <label for="confirma_nova_senha">Confirma nova senha:</label>
                    <input type="password" name="confirma_nova_senha" autocomplete="new-password" id="confirma_nova_senha">
                </div>
                <div class="actions">
                    <button type="button" id="confirmar">Confirmar</button>
                    <button type="button" id="cancelar" onclick="window.location.href='login.html'">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

<script src="../js/jsApi.js"></script>
</body>
</html>
