<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir senha</title>
    <link rel="stylesheet" href="../css/pages/formulario.css">
    <link rel="stylesheet" href="../css/global/global.css">
    <link rel="stylesheet" href="../css/responsividade/formulario.css">
    <link rel="shortcut icon" href="../img/global/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div class="logo">
                <img src="../img/global/Dona_Elisa_logo.png" alt="Logo Dona Elisa">
            </div>

            <form class="form-section">
                <h1>Redefinir senha</h1>
                <p>Digite seu e-mail para seguir com a redefinição da senha:</p>
                <div class="group">
                    <label for="email">Email:</label>
                    <input type="email" name="email" id="email">
                </div>
                <div class="actions">
                    <button type="button" id="continuar">Continuar</button>
                    <button type="button" id="voltar" onclick="window.location.href='login.html'">Voltar para o login</button>
                </div>
            </form>
        </div>
    </div>

<script src="../js/jsApi.js"></script>
</body>
</html>
