<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../css/pages/formulario.css">
    <link rel="stylesheet" href="../css/global/global.css">
    <link rel="stylesheet" href="../css/responsividade/formulario.css">
    <link rel="shortcut icon" href="../img/global/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div class="logo">
                <img src="../img/global/Dona_Elisa_logo.png" alt="Logo Dona Elisa">
            </div>

            <form class="form-section">
                <h1>Cadastro</h1>
                <div class="group">
                    <label for="nome">Nome:</label>
                    <input type="text" name="nome" id="nome" autocomplete="off">
                </div>
                <div class="group">
                    <label for="email">Email:</label>
                    <input type="email" name="email" autocomplete="new-email" id="email">
                </div>
                <div class="group">
                    <label for="senha">Senha:</label>
                    <input type="password" name="senha" autocomplete="new-password" id="senha">
                </div>
                <div class="actions">
                    <span>Já tem uma conta? <a href="login.html">Faça o login</a></span>
                    <button type="button" id="btn-cadastro">Cadastrar</button>
                </div>
            </form>
        </div>
    </div>

<script src="../js/jsApi.js"></script>
</body>
</html>
