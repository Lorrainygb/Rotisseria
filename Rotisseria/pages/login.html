<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/pages/formulario.css">
    <link rel="stylesheet" href="../css/global/global.css">
    <link rel="stylesheet" href="../css/responsividade/formulario.css">
    <link rel="shortcut icon" href="../img/global/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div class="logo">
                <img src="../img/global/Dona_Elisa_logo.png" alt="Logo Dona Elisa">
            </div>

            <form class="form-section">
                <h1>Login</h1>
                <div class="group">
                    <label for="email">Email:</label>
                    <input type="email" name="email" autocomplete="new-email" id="email">
                </div>
                <div class="group">
                    <label for="senha">Senha:</label>
                    <input type="password" name="senha" autocomplete="new-password" id="senha">
                </div>
                <div class="forgot_pass">
                    <a href="redefinir_senha.html">Esqueci a minha senha</a>
                </div>
                <div class="actions">
                    <span>Ainda não tem uma conta? <a href="cadastro.html">Criar nova conta</a></span>
                    <button type="button" id="btn_entrar">Entrar</button>
                </div>
            </form>
        </div>

        <!-- SEU MODAL (mantido igual) -->
        <div id="janela-modal" class="modal" style="display:none;">
            <div class="modal-content">
                <a href="#" id="fecha-modal">X</a>
                <div class="modal-text">
                    <img src="../img/icon/icone_cadeado.png" alt="Icone cadeado">  
                    <h4>Senha incorreta</h4>
                    <p>Tenta novamente</p>
                </div>
            </div>
        </div>
    </div>

<script src="../js/jsApi.js"></script>
</body>
</html>
