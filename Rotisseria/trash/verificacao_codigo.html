<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificação</title>
    <!--=============== IMPORTAÇÕES ===============-->
    <link rel="stylesheet" href="../css/pages/formulario.css">
    <link rel="stylesheet" href="../css/global/global.css">
    <link rel="stylesheet" href="../css/responsividade/formulario.css">
    <link rel="shortcut icon" href="../img/global/favicon.ico" type="image/x-icon">
    <!--=============== IMPORTAÇÕES ===============-->
</head>
<body>
    <div class="container">
        <div class="form-container">
                 <div class="suporte-card">
                <img src="../img/global/Dona_Elisa_logo.png" alt="Logo Dona Elisa">

                <div class="suporte-info">
                    <h3>Email para suporte</h3>
                    <p>elisistema@gmail.com</p>
                </div><!-- suporte info -->
            </div><!--img card -->

            <form class="form-section">
                <h1>Verificação</h1>
                <p>Insira o código de verificação enviado para o seu celular :</p>
                <div class="group">
                    <label for="verificacao">Digite o código:</label>
                    <input type="text" name="codigo" id="codigo">
                </div><!-- group-->
                <div class="actions">
                    <button type="button" id="continuar">Continuar</button>
                    <button type="button" id="voltar">Voltar para o login</button>
                </div><!-- actions -->
                <div class="reenviar_codigo">
                    <a href="#" id="reenviar-codigo">Reenviar o código</a>
                </div>
            </form><!-- form section-->
        </div><!-- form container -->
    </div><!-- container -->
    
</body>
</html>
